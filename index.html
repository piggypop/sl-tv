<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; width:100vw; height:100vh; overflow:hidden; }
    #player { width:100%; height:100%; }
    #home {
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #home h1 {
      color:#fff;
      font-family:Georgia, serif;
      font-size:2.5em;
      font-weight:normal;
      letter-spacing:0.15em;
      text-align:center;
      text-transform:uppercase;
    }
  </style>
</head>
<body>

<div id="home" style="display:none"><h1>Villa Libertine</h1></div>
<div id="player"></div>

<script>
  // --- Διαβάζουμε τις παραμέτρους ---
  var params  = new URLSearchParams(window.location.search);
  var vParam  = params.get('v');   // "ID1,ID2,ID3" ή "ID1"
  var iParam  = parseInt(params.get('i') || '0', 10);

  if (!vParam) {
    // Αρχική σελίδα — δεν φορτώνουμε καν το IFrame API
    document.getElementById('home').style.display = 'flex';
  } else {
    var ids      = vParam.split(',');
    var current  = iParam < ids.length ? iParam : 0;

    // Φόρτωση YouTube IFrame API
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        videoId: ids[current],
        playerVars: {
          autoplay:        1,
          controls:        1,
          rel:             0,
          modestbranding:  1,
          playsinline:     1
        },
        events: {
          onStateChange: onPlayerStateChange
        }
      });
    };

    function onPlayerStateChange(event) {
      // YT.PlayerState.ENDED == 0
      if (event.data === YT.PlayerState.ENDED) {
        var next = current + 1;
        if (next < ids.length) {
          current = next;
          player.loadVideoById(ids[current]);
        }
        // Αν φτάσουμε στο τέλος, μένει στο τελευταίο — δεν κάνει loop
      }
    }
  }
</script>
</body>
</html>
