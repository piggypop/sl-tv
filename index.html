<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; width:100vw; height:100vh; overflow:hidden; }
    iframe { width:100%; height:100%; border:none; display:block; }
  </style>
</head>
<body>
<script>
  var id = new URLSearchParams(window.location.search).get('v');
  if (id) {
    var src = 'https://www.youtube.com/embed/' + id
            + '?autoplay=1&controls=1&rel=0&modestbranding=1';
    var f = document.createElement('iframe');
    f.src = src;
    f.allow = 'autoplay; fullscreen';
    f.allowFullscreen = true;
    document.body.appendChild(f);
  } else {
    document.body.style.display = 'flex';
    document.body.style.alignItems = 'center';
    document.body.style.justifyContent = 'center';
    document.body.innerHTML = '<h1 style="color:#fff;font-family:Georgia,serif;letter-spacing:0.15em">VILLA LIBERTINE</h1>';
  }
</script>
</body>
</html>
