<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; width:100vw; height:100vh; overflow:hidden; }
    #player { width:100%; height:100%; }
    #home {
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #home h1 {
      color:#fff;
      font-family:Georgia, serif;
      font-size:2.5em;
      font-weight:normal;
      letter-spacing:0.15em;
      text-align:center;
      text-transform:uppercase;
    }
  </style>
</head>
<body>

<div id="home" style="display:none"><h1>Villa Libertine</h1></div>
<div id="player"></div>

<script>
  var params  = new URLSearchParams(window.location.search);
  var vParam  = params.get('v');   // "ID1,ID2,ID3"
  var tParam  = parseInt(params.get('t') || '0', 10); // Unix timestamp έναρξης

  if (!vParam) {
    document.getElementById('home').style.display = 'flex';
  } else {
    var ids     = vParam.split(',');
    var current = 0;

    // Υπολογίζουμε πόσα δευτερόλεπτα έχουν περάσει από την έναρξη
    // tParam είναι Unix time (seconds). Date.now() είναι ms.
    var startOffset = tParam > 0 ? Math.floor(Date.now() / 1000) - tParam : 0;
    if (startOffset < 0) startOffset = 0;

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;
    var seeked = false; // κάναμε ήδη seek για το πρώτο video;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        videoId: ids[current],
        playerVars: {
          autoplay:       1,
          controls:       1,
          rel:            0,
          modestbranding: 1,
          playsinline:    1,
          start:          startOffset  // YouTube native start — fallback
        },
        events: {
          onReady:       onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    };

    function onPlayerReady(event) {
      // Seek ακριβής — πιο αξιόπιστο από το playerVars.start
      if (startOffset > 0 && !seeked) {
        seeked = true;
        event.target.seekTo(startOffset, true);
      }
      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        var next = current + 1;
        if (next < ids.length) {
          current = next;
          seeked  = true; // τα επόμενα videos ξεκινούν από την αρχή
          player.loadVideoById(ids[current]);
        }
      }
    }
  }
</script>
</body>
</html>
