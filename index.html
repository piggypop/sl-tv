<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; width:100vw; height:100vh; overflow:hidden; }
    #player { width:100%; height:100%; }
    #home {
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #home svg {
      width: 320px;
      max-width: 80vw;
    }
    .wordmark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 52px;
      font-weight: 400;
      fill: #fff;
      letter-spacing: 0.22em;
      text-anchor: middle;
    }
    .tagline {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
      font-weight: 400;
      fill: rgba(255,255,255,0.45);
      letter-spacing: 0.45em;
      text-anchor: middle;
    }
  </style>
</head>
<body>

<div id="home" style="display:none">
  <svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
    <circle cx="340" cy="158" r="88" fill="none" stroke="#fff" stroke-width="0.8"/>
    <circle cx="340" cy="158" r="68" fill="none" stroke="#fff" stroke-width="0.4"/>
    <circle cx="340" cy="158" r="5"  fill="#fff"/>
    <line x1="340" y1="70"  x2="340" y2="90"  stroke="#fff" stroke-width="0.6"/>
    <line x1="340" y1="226" x2="340" y2="246" stroke="#fff" stroke-width="0.6"/>
    <line x1="252" y1="158" x2="272" y2="158" stroke="#fff" stroke-width="0.6"/>
    <line x1="408" y1="158" x2="428" y2="158" stroke="#fff" stroke-width="0.6"/>
    <text x="340" y="296" class="wordmark">AETHER</text>
    <text x="340" y="326" class="tagline">by PiGGyPoP</text>
  </svg>
</div>

<div id="player"></div>

<script>
  var params  = new URLSearchParams(window.location.search);
  var vParam  = params.get('v');
  var tParam  = parseInt(params.get('t') || '0', 10);

  if (!vParam) {
    document.getElementById('home').style.display = 'flex';
  } else {
    var ids     = vParam.split(',');
    var current = 0;

    var startOffset = tParam > 0 ? Math.floor(Date.now() / 1000) - tParam : 0;
    if (startOffset < 0) startOffset = 0;

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;
    var seeked = false;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        videoId: ids[current],
        playerVars: {
          autoplay:       1,
          controls:       1,
          rel:            0,
          modestbranding: 1,
          playsinline:    1,
          start:          startOffset
        },
        events: {
          onReady:       onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    };

    function onPlayerReady(event) {
      if (startOffset > 0 && !seeked) {
        seeked = true;
        event.target.seekTo(startOffset, true);
      }
      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        var next = current + 1;
        if (next < ids.length) {
          current = next;
          seeked  = true;
          player.loadVideoById(ids[current]);
        }
      }
    }
  }
</script>
</body>
</html>
